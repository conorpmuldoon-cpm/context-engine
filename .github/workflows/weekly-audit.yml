name: Weekly Audit

on:
  schedule:
    - cron: '0 13 * * 1'  # 13:00 UTC Monday = ~8:00 AM ET
  workflow_dispatch: {}    # Manual trigger via GitHub UI

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Run weekly audit
        run: python scripts/weekly_audit.py --no-email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit audit report
        run: |
          git config user.name "Context Engine Bot"
          git config user.email "context-engine-bot@users.noreply.github.com"
          git add outputs/
          git commit -m "Auto: weekly audit $(date +%Y-%m-%d)" || true
          git push
