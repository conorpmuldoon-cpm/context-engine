name: News Scanner

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = ~7:00 AM ET
  workflow_dispatch: {}    # Manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 anthropic jsonschema

      - name: Run news scanner
        run: python scripts/scan_news.py --no-email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit new records
        run: |
          git config user.name "Context Engine Bot"
          git config user.email "context-engine-bot@users.noreply.github.com"
          git add context-store/ outputs/
          git commit -m "Auto: news scan $(date +%Y-%m-%d)" || true
          git push
